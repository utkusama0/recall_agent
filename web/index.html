<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RECALL" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    connect-src 'self' https://api.github.com https://api.groq.com
                https://api.dictionaryapi.dev https://api.anthropic.com
                https://*.workers.dev;
    font-src https://cdn.jsdelivr.net data:;
    media-src *;
  " />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>RECALL</title>

  <!-- KaTeX (math) + DOMPurify (XSS protection). Both required. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --panel2: #1f232c; --border: #2a2f3a;
      --fg: #e7e9ee; --muted: #9aa0a6; --accent: #4f8cff; --accent2: #2f6bdd;
      --good: #3fb950; --warn: #d29922; --bad: #f85149; --code: #0b0d11;
      --radius: 14px; --maxw: 720px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 12px 14px 96px; }
    h1, h2, h3 { margin: 0 0 8px; }
    a { color: var(--accent); }

    button {
      font: inherit; cursor: pointer; border: 1px solid var(--border);
      background: var(--panel2); color: var(--fg); border-radius: 10px; padding: 10px 14px;
      transition: filter 0.12s;
    }
    button:hover { filter: brightness(1.14); }
    button:active { transform: translateY(1px); filter: brightness(0.9); }
    button.primary { background: var(--accent2); border-color: var(--accent); }
    button.ghost { background: transparent; }
    button.btn-sm { padding: 4px 10px; font-size: 13px; }

    input, textarea, select {
      font: inherit; width: 100%; background: var(--panel2);
      color: var(--fg); border: 1px solid var(--border); border-radius: 10px; padding: 10px;
    }
    textarea { min-height: 90px; resize: vertical; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }

    header.topbar { display: flex; align-items: center; gap: 10px; padding: 4px 2px 12px; }
    .topbar .title { font-weight: 700; letter-spacing: .5px; font-size: 17px; }
    .topbar .grow { flex: 1; }
    .pill { font-size: 12px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 9px; white-space: nowrap; }
    .pill.ok { color: var(--good); border-color: #1f3d27; }
    .pill.off { color: var(--warn); border-color: #3d3417; }

    nav.tabs {
      position: fixed; left: 0; right: 0; bottom: 0; display: flex;
      background: var(--panel); border-top: 1px solid var(--border);
      padding: 6px 8px calc(6px + env(safe-area-inset-bottom)); gap: 4px; z-index: 20;
    }
    nav.tabs button {
      flex: 1; border: none; background: transparent; color: var(--muted);
      padding: 8px 4px; font-size: 12px; border-radius: 10px; line-height: 1.2;
    }
    nav.tabs button:hover { filter: none; color: var(--fg); }
    nav.tabs button.active { color: var(--fg); background: var(--panel2); }

    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; margin: 10px 0;
    }
    .front { font-size: 19px; font-weight: 600; line-height: 1.4; }
    .answer { margin-top: 8px; line-height: 1.6; }
    .math-block { margin-top: 10px; overflow-x: auto; }
    .lang-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .note {
      margin-top: 12px; padding: 10px 14px; border-left: 3px solid var(--warn);
      background: var(--panel2); border-radius: 8px; color: #d7c89a; font-size: 15px; line-height: 1.5;
    }
    .tutor-card { background: var(--panel2); border-color: var(--accent2); margin-top: 8px; }
    .tutor-ans {
      margin-top: 10px; padding: 10px 14px; border-left: 3px solid var(--accent2);
      background: var(--panel); border-radius: 8px; color: var(--fg); font-size: 15px; line-height: 1.6;
    }
    .practice {
      margin-top: 12px; padding: 10px 14px; border-left: 3px solid var(--good);
      background: var(--panel2); border-radius: 8px; font-size: 15px;
    }
    .practice .illus { color: var(--muted); font-size: 12px; }
    .src { margin-top: 12px; }
    .src pre, .answer pre, .code pre { white-space: pre-wrap; }
    pre, code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .code {
      margin-top: 10px; background: var(--code); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; overflow-x: auto; font-size: 14px;
    }
    details > summary { cursor: pointer; color: var(--accent); font-size: 14px; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* Grade buttons: 2x2 on narrow screens, 4x1 on wider */
    .grades { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px; }
    .grades button { min-height: 44px; font-weight: 600; font-size: 15px; }
    @media (min-width: 500px) {
      .grades { grid-template-columns: repeat(4, 1fr); }
    }
    .g-again { border-color: var(--bad); color: #ffb4ae; }
    .g-hard  { border-color: var(--warn); color: #ecd28a; }
    .g-good  { border-color: var(--accent); color: #b9d0ff; }
    .g-easy  { border-color: var(--good); color: #a6e3b0; }

    .tags-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      display: inline-block; font-size: 11px; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .row.end { justify-content: flex-end; }
    .grow { flex: 1; }
    .muted { color: var(--muted); }
    .big { font-size: 32px; font-weight: 800; }
    .center { text-align: center; }

    /* Browse hierarchy */
    .domain-group { margin-bottom: 6px; }
    .domain-summary {
      font-weight: 700; font-size: 15px; color: var(--accent);
      padding: 8px 0; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .deck-item { margin: 6px 0; }
    .deck-summary {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; list-style: none;
    }
    .deck-summary::-webkit-details-marker { display: none; }
    .deck-name { flex: 1; font-weight: 600; font-size: 14px; }
    .deck-meta { display: flex; gap: 6px; }
    .deck-cards { padding: 4px 8px 8px; }
    .browse-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 4px;
      border-bottom: 1px solid var(--border);
    }
    .browse-row:last-child { border-bottom: none; }

    .toast {
      position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
      background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; z-index: 50; max-width: 90%;
      box-shadow: 0 6px 24px rgba(0,0,0,.5); font-size: 14px;
    }
    .hidden { display: none !important; }
    .speak { background: transparent; border: none; color: var(--accent); padding: 4px 6px; font-size: 20px; cursor: pointer; }
    .ipa { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <span class="title">RECALL</span>
      <span class="grow"></span>
      <span id="syncPill" class="pill">…</span>
    </header>
    <main id="view"></main>
  </div>

  <nav class="tabs">
    <button data-tab="review" class="active">📖 Review</button>
    <button data-tab="browse">🗂 Browse</button>
    <button data-tab="import">＋ Import</button>
    <button data-tab="settings">⚙ Settings</button>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
